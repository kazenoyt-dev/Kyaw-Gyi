<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Khin Shop - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  /* 🌸 CUSTOM THEME: Crimson & Pink 🌸 */
  :root { 
    --bg: #030002; 
    --text: #ffffff; 
    --muted: #fbcfe8; 
    --primary: #9e1b32; /* ကြက်သွေးရောင် */
    --accent: #ff69b4; /* ပန်းနုရောင် */
    --ok: #10b981; 
    --danger: #ef4444; 
    --warning: #f59e0b; 
    --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%); 
    --glass-border: rgba(255, 105, 180, 0.2); 
    --glass-highlight: rgba(255, 255, 255, 0.25); 
    --glass-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,105,180,0.05); 
    --nav-bg: rgba(10, 0, 5, 0.85); 
    --input-bg: rgba(0, 0, 0, 0.4); 
  }
  
  [data-theme="light"] { 
    --bg: #fff0f6; 
    --text: #4a044e; 
    --muted: #9d174d; 
    --primary: #be123c; 
    --accent: #db2777; 
    --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.5) 100%); 
    --glass-border: rgba(219, 39, 119, 0.3); 
    --glass-highlight: #ffffff; 
    --glass-shadow: 0 8px 30px rgba(219, 39, 119, 0.1), inset 0 0 20px rgba(255,255,255,0.6); 
    --nav-bg: rgba(255, 255, 255, 0.9); 
    --input-bg: rgba(255, 255, 255, 0.7); 
  }
  
  *{box-sizing:border-box; outline:none; margin:0; padding:0; -webkit-tap-highlight-color:transparent;} 
  body{font-family:'Poppins', sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; transition: background 0.4s ease, color 0.4s ease;}
  
  /* 🌸 CUSTOM REQUEST: Moving liquid colors behind glass 🌸 */
  .liquid-bg { position: fixed; inset: 0; z-index: -3; background: radial-gradient(circle at 15% 50%, rgba(255, 105, 180, 0.3), transparent 50%), radial-gradient(circle at 85% 30%, rgba(158, 27, 50, 0.3), transparent 60%), radial-gradient(circle at 50% 80%, rgba(219, 39, 119, 0.2), transparent 50%); filter: blur(60px); animation: liquidFlow 12s infinite alternate ease-in-out; pointer-events: none;} 
  @keyframes liquidFlow { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.15) translate(5%, -5%); } }

  /* 🌸 CUSTOM REQUEST: Falling Flowers UI 🌸 */
  .petals-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -2; overflow: hidden; }
  .petal { position: absolute; top: -10%; color: var(--accent); opacity: 0.5; font-size: 1.2rem; user-select: none; animation: fall linear infinite; filter: drop-shadow(0 0 5px rgba(255,105,180,0.5));}
  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
  }
  
  .app-container{max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:100px;}
  
  .glass-card { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); border-left: 1px solid var(--glass-highlight); box-shadow: var(--glass-shadow); border-radius: 20px; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
  .glass-tint-ok { background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.02)); border-color: rgba(16,185,129,0.3); } 
  .glass-tint-warn { background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.02)); border-color: rgba(245,158,11,0.3); } 
  .glass-tint-danger { background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.02)); border-color: rgba(239,68,68,0.3); }
  
  .page, #auth-screen{display:none; padding:16px; animation:fadeInSlide 0.3s forwards;} .page.active, #auth-screen.active{display:block;} 
  @keyframes fadeInSlide { from {opacity:0; transform:translateY(15px);} to {opacity:1; transform:translateY(0);} }
  
  .glass-input { width: 100%; font-family: 'Poppins'; font-size: 14px; padding: 16px; border-radius: 16px; margin-bottom: 15px; transition: 0.3s; background: var(--input-bg); color: var(--text); border: 1px solid var(--glass-border); box-shadow: inset 0 4px 10px rgba(0,0,0,0.3); } 
  .glass-input:focus { border-color: var(--accent); box-shadow: inset 0 4px 10px rgba(0,0,0,0.3), 0 0 15px rgba(255, 105, 180, 0.4); }
  
  .btn-gel { background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%), linear-gradient(135deg, var(--accent), var(--primary)); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 16px 20px; border-radius: 16px; font-weight: 700; width: 100%; font-family: 'Poppins'; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4); } 
  .btn-gel:active { transform: scale(0.95); } .btn-gel:disabled { background: rgba(128,128,128,0.3); border-color: transparent; color: var(--muted); box-shadow: none; cursor: not-allowed; }
  
  .toast{position:fixed; top:-100px; left:50%; transform:translateX(-50%); background:var(--ok); color:#fff; padding:12px 24px; border-radius:999px; font-weight:800; font-size:13px; opacity:0; transition:0.5s; z-index:99999; box-shadow: 0 8px 30px rgba(0,0,0,0.5);} 
  .toast.show{opacity:1; top:30px;}
  
  .compact-header { display:flex; justify-content:space-between; align-items:center; padding:10px 15px; margin-bottom:20px; border-radius:20px; background:var(--glass-bg); backdrop-filter:blur(25px); border:1px solid var(--glass-border); box-shadow:var(--glass-shadow); } 
  .top-action-btn { background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:var(--text); border-radius:12px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: 0.2s;}
  
  /* 💡 BANNER SLIDER 💡 */
  .banner-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; margin-bottom: 25px; border-radius: 24px; scrollbar-width: none; }
  .banner-slider::-webkit-scrollbar { display: none; }
  .banner-slide { flex: 0 0 100%; width: 100%; height: 180px; object-fit: cover; scroll-snap-align: center; border-radius: 24px; border: 1px solid var(--glass-highlight); box-shadow: var(--glass-shadow); pointer-events: none;}
  .game-container { display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; } 
  .game-card { padding:18px; display:flex; flex-direction:column; align-items:center; text-align:center; cursor: pointer; border-radius: 24px;} 
  .game-img { width:80px; height:80px; border-radius:20px; margin-bottom:12px; object-fit: cover; box-shadow: 0 8px 25px rgba(0,0,0,0.4);} 
  .game-card:active { transform: scale(0.96); border-color: var(--accent); }
  
  .pay-tabs { display:flex; background:rgba(0,0,0,0.3); border-radius:14px; padding:5px; margin-bottom:20px; border:1px solid var(--glass-border); } 
  .pay-tab { flex:1; text-align:center; padding:12px; font-size:13px; font-weight:700; color:var(--muted); border-radius:10px; cursor:pointer; transition:0.3s; } 
  .pay-tab.active { background:var(--glass-highlight); color:var(--text); box-shadow:0 4px 15px rgba(0,0,0,0.2); } 
  .pay-view { display:none; animation:fadeInSlide 0.3s forwards; } .pay-view.active { display:block; }
  
  .dyn-pay-card { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display:flex; justify-content:space-between; align-items:center;} 
  .dyn-pay-card.selected { border-color: var(--ok); background: rgba(16, 185, 129, 0.15); box-shadow:inset 0 0 15px rgba(16,185,129,0.2);}
  
  .pack-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:25px; } 
  .pack-card { padding:20px 10px; cursor:pointer; text-align:center; border:2px solid transparent; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px;} 
  .pack-card.selected { border-color:var(--accent); background:rgba(255, 105, 180, 0.15); box-shadow:0 10px 30px rgba(255, 105, 180, 0.2), inset 0 0 15px rgba(255, 105, 180, 0.1); transform: translateY(-5px); border-top: 2px solid rgba(255,255,255,0.5);}
  
  .buy-bottom-bar { position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; padding:20px 20px max(20px, env(safe-area-inset-bottom)); z-index:100; display:flex; justify-content:space-between; align-items:center; border-radius:30px 30px 0 0; background: var(--nav-bg); backdrop-filter: blur(30px) saturate(150%); border-top: 1px solid var(--glass-highlight); box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
  
  .main-nav { position:fixed; bottom:15px; left:15px; right:15px; max-width:450px; margin:0 auto; display:flex; justify-content:space-around; background: var(--nav-bg); backdrop-filter:blur(30px); border:1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); border-radius: 999px; padding:12px 10px max(12px,env(safe-area-inset-bottom)); z-index:90; box-shadow: 0 20px 40px rgba(0,0,0,0.8); } 
  .nav-btn{flex:1; background:transparent; border:none; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition: 0.3s;} 
  .nav-btn.active{color:var(--accent); text-shadow: 0 0 15px rgba(255,105,180,0.6);} 
  .nav-btn.active i { transform: scale(1.15) translateY(-2px); color: var(--accent); }
  
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(15px); display:none; align-items:center; justify-content:center; z-index:9000; padding:20px; opacity:0; transition:0.3s; } 
  .modal-overlay.active { display:flex; opacity:1; } 
  .modal-box { width:100%; max-width:400px; padding:24px; border-radius:28px; position:relative; transform:scale(0.95) translateY(20px); transition:0.4s; } 
  .modal-overlay.active .modal-box { transform:scale(1) translateY(0); }
</style>
</head>
<body data-theme="dark">

<div class="liquid-bg"></div>
<div class="petals-container" id="petals-container"></div>

<div id="toast" class="toast">Message</div>

<div id="auth-screen" class="modal-overlay">
    <div class="glass-card modal-box" style="margin-top:0; border:1px solid var(--accent); text-align:center;">
        <div style="width:80px; height:80px; background:linear-gradient(135deg, var(--accent), var(--primary)); border-radius:24px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin:0 auto 20px; box-shadow:0 15px 30px rgba(158,27,50,0.4), inset 0 2px 10px rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.4);">
            <img src="https://i.ibb.co/JR3Qx2y2/2216.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div style="font-size:24px; font-weight:800; margin-bottom:30px; color:var(--text);" data-i18n="pls_login">Khin Shop Admin</div>
        <input type="email" id="auth-email" class="glass-input" data-i18n-ph="email_ph" placeholder="Admin Email" value="kyawgyi@gmail.com">
        <input type="password" id="auth-password" class="glass-input" data-i18n-ph="pass_ph" placeholder="Admin Password" value="123456">
        <button class="btn-gel" id="auth-btn" onclick="window.handleAuth()" data-i18n="login_btn">Admin Login</button>
    </div>
</div>

<div id="main-app" class="app-container active">
    <div id="page-home" class="page active">
        <div class="compact-header">
            <div style="display:flex; gap:10px; align-items:center;">
                <img src="https://i.ibb.co/JR3Qx2y2/2216.png" style="height:30px; object-fit:contain;">
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <div onclick="window.checkAuthAndGo('page-profile')" style="display:flex; align-items:center; gap:8px; background:rgba(16,185,129,0.15); padding:6px 12px; border-radius:12px; border:1px solid rgba(16,185,129,0.3); cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.2);">
                    <i class="fas fa-wallet" style="color:var(--ok); font-size:14px;"></i><span id="home-wallet" style="font-weight:bold; font-size:13px; color:var(--text);">Admin Panel</span>
                </div>
            </div>
        </div>
        
        <div style="font-weight:800; font-size:22px; margin-bottom:15px;">Admin Control Panel</div>
        
        <div id="dyn-game-list" class="game-container grid-view"><div style="text-align:center; padding:20px; color:var(--muted); grid-column: span 2;" data-i18n="loading">Loading Admin Stats...</div></div>
    </div>

    <div id="page-profile" class="page">
        <h2 style="margin-bottom:20px; font-weight:800; font-size:24px;" data-i18n="profile">Admin Settings</h2>
        <div class="glass-card" style="padding:30px 20px; text-align:center; margin-bottom:25px;">
            <div style="width:80px; height:80px; background:linear-gradient(135deg, var(--accent), var(--primary)); color:#fff; border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:35px; font-weight:bold; margin:0 auto 15px;">🌸</div>
            <div style="font-size:18px; font-weight:bold;" id="prof-email">--</div>
            <div style="font-size:12px; color:var(--accent); font-weight:700; margin-bottom:25px;" id="prof-role">Administrator</div>
        </div>
        
        <div style="display:flex; gap:12px; margin-bottom:12px;">
            <div class="glass-card" style="flex:1; padding:16px; display:flex; justify-content:center; align-items:center; cursor:pointer;" onclick="window.toggleTheme()"><div style="display:flex; align-items:center; gap:10px;"><i class="fas fa-adjust text-muted"></i><strong style="font-size:13px;" data-i18n="theme">Theme</strong></div></div>
        </div>
        
        <div class="glass-card" style="padding:16px; margin-bottom:25px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="window.logout()">
            <div style="display:flex; align-items:center; gap:15px;"><div style="width:40px; height:40px; border-radius:12px; background:rgba(239,68,68,0.15); color:var(--danger); display:flex; justify-content:center; align-items:center;"><i class="fas fa-sign-out-alt"></i></div><strong style="color:var(--danger); font-weight:600;" data-i18n="logout">Logout</strong></div>
        </div>
    </div>

    <div id="page-orders" class="page" style="padding-bottom:120px;"><div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;"><div class="top-action-btn" onclick="window.navBack()"><i class="fas fa-arrow-left"></i></div><h2 style="margin:0; font-weight:800;" data-i18n="my_orders">Manage Orders</h2></div><div id="orders-list"></div></div>

    <div class="main-nav" id="main-nav">
        <button class="nav-btn active" id="nav-page-home" onclick="window.navToMain('page-home')"><i class="fas fa-chart-line mb-1" style="font-size:22px;"></i><span style="font-size:11px; font-weight:600;">Dash</span></button>
        <button class="nav-btn" id="nav-page-orders" onclick="window.checkAuthAndGo('page-orders')"><i class="fas fa-shopping-bag mb-1" style="font-size:22px;"></i><span style="font-size:11px; font-weight:600;">Orders</span></button>
        <button class="nav-btn" id="nav-page-profile" onclick="window.checkAuthAndGo('page-profile')"><i class="fas fa-cog mb-1" style="font-size:22px;"></i><span style="font-size:11px; font-weight:600;">Settings</span></button>
    </div>
</div>

<script>
    // 🌸 FALLING FLOWER PETALS JS 🌸
    function createPetals() {
        const container = document.getElementById('petals-container');
        if(!container) return;
        const petalChars = ['🌸', '💮', '🌺', '✨'];
        for(let i=0; i<18; i++) {
            let p = document.createElement('div');
            p.className = 'petal';
            p.innerText = petalChars[Math.floor(Math.random()*petalChars.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 5 + 6) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            p.style.fontSize = (Math.random() * 12 + 10) + 'px';
            container.appendChild(p);
        }
    }
    document.addEventListener('DOMContentLoaded', createPetals);

    // BASIC UI SCRIPTS
    window.toast = function(m) { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500); };
    window.openModal = function(id) { document.getElementById(id).classList.add('active'); };
    window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); };
    
    window.curTheme = localStorage.getItem('theme') || 'dark';
    window.applyTheme = function() { document.body.setAttribute('data-theme', window.curTheme); };
    window.toggleTheme = function() { window.curTheme = window.curTheme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', window.curTheme); window.applyTheme(); };
    window.applyTheme();

    window.navToMain = function(id) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); let b = document.getElementById('nav-'+id); if(b) b.classList.add('active'); window.navTo(id); };
    window.navTo = function(id, pushState = true) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); let tPage = document.getElementById(id); if(tPage) tPage.classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); if(pushState) history.pushState({page: id}, "", "#"+id); };
    window.navBack = function() { history.back(); };
    window.addEventListener('popstate', (e) => { if(e.state && e.state.page) window.navTo(e.state.page, false); else window.navTo('page-home', false); });
    
    window.checkAuthAndGo = function(id) { if(!window.me) { window.openAuthScreen(); return; } window.navToMain(id); };
    window.openAuthScreen = function() { let a = document.getElementById('auth-screen'); if(a) a.classList.add('active'); };
    window.closeAuthScreen = function() { let a = document.getElementById('auth-screen'); if(a) a.classList.remove('active'); };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    
    // 🌸 CUSTOM FIREBASE CONFIG 🌸
    const firebaseConfig = {
      apiKey: "AIzaSyAkJh1Q1gp172R5rBEAF2sijfpdg3Iw38Y",
      authDomain: "kyawgyi-390bc.firebaseapp.com",
      projectId: "kyawgyi-390bc",
      storageBucket: "kyawgyi-390bc.firebasestorage.app",
      messagingSenderId: "550934767997",
      appId: "1:550934767997:web:02cec32177f7e8ceb20414",
      measurementId: "G-JR3HQ8PCNV"
    };
    
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
    window.me = null;
    
    window.handleAuth = async () => { 
        const em = document.getElementById('auth-email').value.trim(); 
        const pw = document.getElementById('auth-password').value.trim(); 
        document.getElementById('auth-btn').innerText = "Logging in..."; 
        try { 
            await signInWithEmailAndPassword(auth, em, pw); 
        } catch(e) { 
            window.toast("Invalid Credentials"); 
            document.getElementById('auth-btn').innerText = "Admin Login"; 
        } 
    };
    
    window.logout = () => { signOut(auth); window.navToMain('page-home'); };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            window.me = user; 
            window.closeAuthScreen(); 
            let pe = document.getElementById('prof-email'); if(pe) pe.innerText = window.me.email;
            loadAdminData();
        } else { 
            window.me = null; 
            window.openAuthScreen();
        }
    });

    function loadAdminData() {
        // Fetch all orders logic for Admin Panel...
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
            let oHtml = "";
            snap.forEach(d => {
                let o = {id:d.id, ...d.data()};
                let colorCls = o.status==='Completed' ? 'glass-tint-ok' : (o.status==='Cancelled' ? 'glass-tint-danger' : 'glass-tint-warn');
                let txtColor = o.status==='Completed' ? 'var(--ok)' : (o.status==='Cancelled' ? 'var(--danger)' : 'var(--warning)');
                
                oHtml += `<div class="glass-card ${colorCls}" style="padding:18px; margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <span style="font-family:monospace; color:var(--text); font-weight:bold; font-size:13px;">${o.orderId || o.id.substring(0,8)}</span>
                        <span style="background:rgba(255,255,255,0.1); color:${txtColor}; font-size:11px; padding:4px 12px; border-radius:8px; font-weight:800; border:1px solid ${txtColor}40;">${o.status.toUpperCase()}</span>
                    </div>
                    <div style="font-weight:800; font-size:16px; color:var(--text);">${o.game} - <span style="color:var(--muted);">${o.item}</span></div>
                    <div style="font-size:13px; color:var(--muted); margin-top:5px;">User: ${o.userEmail} | ID: ${o.playerId}</div>
                    <div style="font-size:18px; font-weight:900; margin-top:12px; color:${txtColor}; text-shadow:0 0 10px ${txtColor}40;">${(o.price||0).toLocaleString()} Ks</div>
                </div>`; 
            });
            let ol = document.getElementById('orders-list'); 
            if(ol) ol.innerHTML = oHtml || `<div style='text-align:center; color:gray; padding:50px;'><i class="fas fa-box-open text-5xl mb-4 block"></i>No orders found.</div>`;
            
            let gList = document.getElementById('dyn-game-list');
            if(gList) gList.innerHTML = `<div class="glass-card" style="padding:20px; text-align:center; grid-column: span 2;">
                <h3 style="color:var(--accent); font-weight:bold;">Total Orders</h3>
                <h1 style="color:var(--ok); font-size:40px; margin-top:10px;">${snap.size}</h1>
            </div>`;
        });
    }
</script>
</body>
</html>
