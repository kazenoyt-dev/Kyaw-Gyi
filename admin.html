<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Khin Khin Shop - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  :root { 
    --bg: #030308; --text: #ffffff; --muted: #a1a1aa; 
    --primary: #db2777; --accent: #f472b6; 
    --ok: #10b981; --danger: #ef4444; --warning: #f59e0b; 
    --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%); 
    --glass-border: rgba(255, 255, 255, 0.1); 
    --glass-highlight: rgba(255, 255, 255, 0.25); 
    --glass-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.03); 
    --nav-bg: rgba(5, 5, 12, 0.85); --input-bg: rgba(0, 0, 0, 0.3); 
  }
  
  *{box-sizing:border-box; outline:none; margin:0; padding:0;} 
  body{font-family:'Poppins', sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden;}
  
  /* FLOWER PETAL ANIMATION & BACKGROUND */
  .liquid-bg { position: fixed; inset: 0; z-index: -3; background: radial-gradient(circle at 15% 50%, rgba(244, 114, 182, 0.25), transparent 50%), radial-gradient(circle at 85% 30%, rgba(219, 39, 119, 0.25), transparent 50%); filter: blur(60px); animation: liquidFlow 15s infinite alternate ease-in-out; pointer-events: none;} 
  @keyframes liquidFlow { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.1) translate(5%, 5%); } }
  
  .petal { position: fixed; top: -10px; background: #fbcfe8; border-radius: 15px 0 15px 0; z-index: -1; animation: fall linear forwards; opacity: 0.6; box-shadow: 0 0 8px rgba(251, 207, 232, 0.6);}
  @keyframes fall { 
      0% { transform: translateY(-10px) rotate(0deg) translateX(0); }
      50% { transform: translateY(50vh) rotate(180deg) translateX(20px); }
      100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); } 
  }

  /* Admin Layout */
  .admin-container { max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; display: none; }
  .admin-container.active { display: block; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

  .glass-card { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); border-left: 1px solid var(--glass-highlight); box-shadow: var(--glass-shadow); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
  
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .header img { height: 40px; }
  
  .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
  .tab-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--muted); padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; white-space: nowrap; }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--accent); box-shadow: 0 5px 15px rgba(219, 39, 119, 0.4); }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s; }

  /* Login Screen */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { max-width: 400px; width: 100%; text-align: center; }
  .glass-input { width: 100%; font-family: 'Poppins'; font-size: 14px; padding: 16px; border-radius: 16px; margin-bottom: 15px; background: var(--input-bg); color: var(--text); border: 1px solid var(--glass-border); } 
  .glass-input:focus { border-color: var(--accent); }
  .btn-gel { background: linear-gradient(135deg, var(--accent), var(--primary)); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 16px 20px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(219, 39, 119, 0.4); } 
  .btn-gel:active { transform: scale(0.95); }

  /* Data Cards */
  .data-card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
  .data-row { display: flex; justify-content: space-between; font-size: 14px; }
  .data-row span:first-child { color: var(--muted); }
  .data-row span:last-child { font-weight: bold; }
  .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
  .badge.pending { background: rgba(245,158,11,0.2); color: var(--warning); border: 1px solid var(--warning); }
  .action-btns { display: flex; gap: 10px; margin-top: 10px; }
  .btn-sm { flex: 1; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; color: white; transition: 0.2s;}
  .btn-approve { background: var(--ok); box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
  .btn-reject { background: var(--danger); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
  
  .slip-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; margin-top: 10px; cursor: pointer; border: 1px dashed var(--accent); }
</style>
</head>
<body>

<div class="liquid-bg"></div>

<div id="auth-screen">
    <div class="glass-card login-box">
        <img src="https://i.ibb.co/JR3Qx2y2/2216.png" style="height:60px; object-fit:contain; margin-bottom:20px;">
        <h2 style="margin-bottom: 5px; color: var(--accent);">Admin Panel</h2>
        <p style="color: var(--muted); font-size: 13px; margin-bottom: 25px;">Khin Khin Shop</p>
        
        <input type="email" id="auth-email" class="glass-input" placeholder="Admin Email" value="kyawgyi@gmail.com">
        <input type="password" id="auth-password" class="glass-input" placeholder="Password" value="123456">
        <button class="btn-gel" id="auth-btn" onclick="handleLogin()">Login to Dashboard</button>
    </div>
</div>

<div id="admin-panel" class="admin-container">
    <div class="header glass-card" style="margin-bottom: 20px; padding: 15px 20px;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://i.ibb.co/JR3Qx2y2/2216.png">
            <div>
                <h3 style="margin:0; font-size:16px;">Khin Khin Shop Admin</h3>
                <span style="font-size:12px; color:var(--ok);">● Online</span>
            </div>
        </div>
        <button onclick="logout()" style="background:transparent; border:none; color:var(--danger); cursor:pointer; font-size: 20px;"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('orders', this)"><i class="fas fa-shopping-cart"></i> Orders</button>
        <button class="tab-btn" onclick="switchTab('deposits', this)"><i class="fas fa-wallet"></i> Deposits</button>
        <button class="tab-btn" onclick="switchTab('withdraws', this)"><i class="fas fa-money-bill-wave"></i> Withdraws</button>
    </div>

    <div id="tab-orders" class="tab-content active glass-card">
        <h3 style="margin-bottom: 15px; color: var(--accent);"><i class="fas fa-box"></i> Pending Orders</h3>
        <div id="orders-list"><p style="color:var(--muted); text-align:center;">Loading orders...</p></div>
    </div>

    <div id="tab-deposits" class="tab-content glass-card">
        <h3 style="margin-bottom: 15px; color: var(--accent);"><i class="fas fa-arrow-down"></i> Pending Deposits</h3>
        <div id="deposits-list"><p style="color:var(--muted); text-align:center;">Loading deposits...</p></div>
    </div>

    <div id="tab-withdraws" class="tab-content glass-card">
        <h3 style="margin-bottom: 15px; color: var(--accent);"><i class="fas fa-arrow-up"></i> Pending Withdrawals</h3>
        <div id="withdraws-list"><p style="color:var(--muted); text-align:center;">Loading withdrawals...</p></div>
    </div>

</div>

<script>
    // FEMININE TOUCH - FLOWER PETALS JS
    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = Math.random() * 3 + 3 + 's';
        petal.style.opacity = Math.random() * 0.4 + 0.4;
        let size = Math.random() * 8 + 6;
        petal.style.width = size + 'px';
        petal.style.height = size + 'px';
        document.body.appendChild(petal);
        setTimeout(() => { petal.remove(); }, 6000);
    }
    setInterval(createPetal, 400);

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tabId).classList.add('active');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAkJh1Q1gp172R5rBEAF2sijfpdg3Iw38Y",
      authDomain: "kyawgyi-390bc.firebaseapp.com",
      projectId: "kyawgyi-390bc",
      storageBucket: "kyawgyi-390bc.firebasestorage.app",
      messagingSenderId: "550934767997",
      appId: "1:550934767997:web:02cec32177f7e8ceb20414",
      measurementId: "G-JR3HQ8PCNV"
    };
    
    const app = initializeApp(firebaseConfig); 
    const auth = getAuth(app); 
    const db = getFirestore(app);

    window.handleLogin = async () => { 
        const em = document.getElementById('auth-email').value.trim(); 
        const pw = document.getElementById('auth-password').value.trim(); 
        const btn = document.getElementById('auth-btn');
        btn.innerText = "Loading...";
        try { 
            await signInWithEmailAndPassword(auth, em, pw); 
        } catch(e) { 
            alert(e.message); 
            btn.innerText = "Login to Dashboard"; 
        } 
    };

    window.logout = () => { signOut(auth); };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-panel').classList.add('active');
            loadAdminData();
        } else { 
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('admin-panel').classList.remove('active');
        }
    });

    function loadAdminData() {
        // 1. Load Pending Orders
        onSnapshot(query(collection(db, "orders"), where("status", "==", "Pending")), (snap) => {
            let html = "";
            snap.forEach(d => {
                let o = {id: d.id, ...d.data()};
                let slipHtml = o.slipImage ? `<img src="${o.slipImage}" class="slip-img" onclick="window.open('${o.slipImage}')">` : '';
                html += `
                <div class="data-card">
                    <div class="data-row"><span>Order ID</span><span style="color:var(--accent);">${o.orderId || o.id.substring(0,8)}</span></div>
                    <div class="data-row"><span>User</span><span>${o.userEmail}</span></div>
                    <div class="data-row"><span>Game</span><span>${o.game} (${o.item})</span></div>
                    <div class="data-row"><span>Player ID</span><span>${o.playerId}</span></div>
                    <div class="data-row"><span>Price</span><span style="color:var(--ok);">${o.price.toLocaleString()} Ks</span></div>
                    <div class="data-row"><span>Method</span><span>${o.payMethod}</span></div>
                    ${slipHtml}
                    <div class="action-btns">
                        <button class="btn-sm btn-approve" onclick="completeOrder('${o.id}')">Complete</button>
                        <button class="btn-sm btn-reject" onclick="cancelOrder('${o.id}', '${o.userId}', ${o.price}, '${o.payMethod}')">Cancel/Refund</button>
                    </div>
                </div>`;
            });
            document.getElementById('orders-list').innerHTML = html || "<p style='color:gray;text-align:center;'>No pending orders.</p>";
        });

        // 2. Load Pending Deposits
        onSnapshot(query(collection(db, "deposits"), where("status", "==", "Pending")), (snap) => {
            let html = "";
            snap.forEach(d => {
                let dp = {id: d.id, ...d.data()};
                let slipHtml = dp.slipImage ? `<img src="${dp.slipImage}" class="slip-img" onclick="window.open('${dp.slipImage}')">` : '';
                html += `
                <div class="data-card">
                    <div class="data-row"><span>Deposit ID</span><span style="color:var(--accent);">${dp.depId || dp.id.substring(0,8)}</span></div>
                    <div class="data-row"><span>User</span><span>${dp.userEmail}</span></div>
                    <div class="data-row"><span>Amount</span><span style="color:var(--ok);">${dp.amount.toLocaleString()} Ks</span></div>
                    <div class="data-row"><span>Method</span><span>${dp.payMethod}</span></div>
                    ${slipHtml}
                    <div class="action-btns">
                        <button class="btn-sm btn-approve" onclick="approveDeposit('${dp.id}', '${dp.userId}', ${dp.amount})">Approve</button>
                        <button class="btn-sm btn-reject" onclick="rejectDeposit('${dp.id}')">Reject</button>
                    </div>
                </div>`;
            });
            document.getElementById('deposits-list').innerHTML = html || "<p style='color:gray;text-align:center;'>No pending deposits.</p>";
        });

        // 3. Load Pending Withdrawals
        onSnapshot(query(collection(db, "withdrawals"), where("status", "==", "Pending")), (snap) => {
            let html = "";
            snap.forEach(d => {
                let w = {id: d.id, ...d.data()};
                html += `
                <div class="data-card">
                    <div class="data-row"><span>Withdraw ID</span><span style="color:var(--accent);">${w.wdId || w.id.substring(0,8)}</span></div>
                    <div class="data-row"><span>User</span><span>${w.userEmail}</span></div>
                    <div class="data-row"><span>Amount</span><span style="color:var(--danger);">${w.amount.toLocaleString()} Ks</span></div>
                    <div class="data-row"><span>Method</span><span>${w.payMethod}</span></div>
                    <div class="data-row"><span>Account Name</span><span>${w.accName}</span></div>
                    <div class="data-row"><span>Phone</span><span style="color:var(--warning); font-size:16px;">${w.accPhone}</span></div>
                    <div class="action-btns">
                        <button class="btn-sm btn-approve" onclick="approveWithdraw('${w.id}')">Transfer Done</button>
                        <button class="btn-sm btn-reject" onclick="rejectWithdraw('${w.id}', '${w.userId}', ${w.amount})">Reject (Refund)</button>
                    </div>
                </div>`;
            });
            document.getElementById('withdraws-list').innerHTML = html || "<p style='color:gray;text-align:center;'>No pending withdrawals.</p>";
        });
    }

    // --- ACTIONS ---

    // ORDER ACTIONS
    window.completeOrder = async (id) => {
        if(confirm("Are you sure this order is completed?")) {
            await updateDoc(doc(db, "orders", id), { status: "Completed" });
            alert("Order marked as Completed.");
        }
    };
    window.cancelOrder = async (orderId, userId, price, method) => {
        if(confirm("Cancel order and refund to user wallet?")) {
            await updateDoc(doc(db, "orders", orderId), { status: "Cancelled" });
            if(method === "Wallet") {
                let userRef = doc(db, "users", userId);
                let userSnap = await getDoc(userRef);
                if(userSnap.exists()) {
                    let currentBal = userSnap.data().walletBalance || 0;
                    await updateDoc(userRef, { walletBalance: currentBal + price });
                    await addDoc(collection(db, "transactions"), { userId: userId, type: 'Refund', amount: price, desc: `Order Cancelled Refund`, createdAt: serverTimestamp() });
                }
            }
            alert("Order Cancelled.");
        }
    };

    // DEPOSIT ACTIONS
    window.approveDeposit = async (depId, userId, amount) => {
        if(confirm(`Approve deposit of ${amount} Ks?`)) {
            let userRef = doc(db, "users", userId);
            let userSnap = await getDoc(userRef);
            if(userSnap.exists()) {
                let currentBal = userSnap.data().walletBalance || 0;
                await updateDoc(userRef, { walletBalance: currentBal + amount });
                await updateDoc(doc(db, "deposits", depId), { status: "Completed" });
                await addDoc(collection(db, "transactions"), { userId: userId, type: 'Deposit', amount: amount, desc: `Deposit Approved`, createdAt: serverTimestamp() });
                alert("Deposit Approved! User balance updated.");
            }
        }
    };
    window.rejectDeposit = async (depId) => {
        if(confirm("Reject this deposit?")) {
            await updateDoc(doc(db, "deposits", depId), { status: "Cancelled" });
            alert("Deposit Rejected.");
        }
    };

    // WITHDRAWAL ACTIONS
    window.approveWithdraw = async (wdId) => {
        if(confirm("Have you transferred the money to the user?")) {
            await updateDoc(doc(db, "withdrawals", wdId), { status: "Completed" });
            alert("Withdrawal marked as Completed.");
        }
    };
    window.rejectWithdraw = async (wdId, userId, amount) => {
        if(confirm("Reject withdrawal and refund balance to user?")) {
            await updateDoc(doc(db, "withdrawals", wdId), { status: "Cancelled" });
            let userRef = doc(db, "users", userId);
            let userSnap = await getDoc(userRef);
            if(userSnap.exists()) {
                let currentBal = userSnap.data().walletBalance || 0;
                await updateDoc(userRef, { walletBalance: currentBal + amount });
                await addDoc(collection(db, "transactions"), { userId: userId, type: 'Refund', amount: amount, desc: `Withdrawal Rejected`, createdAt: serverTimestamp() });
                alert("Withdrawal Rejected & Refunded.");
            }
        }
    };

</script>
</body>
</html>
